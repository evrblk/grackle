syntax = "proto3";

package com.evrblk.grackle.corepb;

option go_package = "github.com/evrblk/grackle/pkg/corepb";

message PaginationToken {
  enum Type {
    NEXT = 0;
    PREVIOUS = 1;
  }

  Type type = 1;
  bytes value = 2;
}

message LeaseId {
  uint64 account_id = 1;
  uint32 namespace_id = 2;
  uint64 lease_id = 3;
}

message Lease {
  LeaseId id = 1;
  string process_id = 2;
  int64 created_at = 3;
  int64 expires_at = 4;
}
