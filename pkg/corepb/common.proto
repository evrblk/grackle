syntax = "proto3";

package com.evrblk.grackle.corepb;

option go_package = "github.com/evrblk/grackle/pkg/corepb";

message PaginationToken {
  enum Type {
    INVALID = 0;
    NEXT = 1;
    PREVIOUS = 2;
  }

  Type type = 1;
  bytes value = 2;
}

message LeaseId {
  fixed64 account_id = 1;
  fixed64 namespace_id = 2;
  fixed64 lease_id = 3;
}

message Lease {
  LeaseId id = 1;
  string process_id = 2;
  sfixed64 created_at = 3;
  sfixed64 expires_at = 4;
  map<string, string> metadata = 5;
}
