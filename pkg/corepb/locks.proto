syntax = "proto3";

package com.evrblk.grackle.corepb;

import "pkg/corepb/common.proto";
import "pkg/corepb/namespaces.proto";

option go_package = "github.com/evrblk/grackle/pkg/corepb";

message AcquireLockRequest {
  LockId lock_id = 1;
  uint64 lease_id = 2;
  bool exclusive = 3;
  map<string, string> metadata = 4;
  int64 now = 5;
  int64 max_number_of_locks_per_namespace = 6;
}

message AcquireLockResponse {
  Lock lock = 1;
  bool success = 2;
}

message ReleaseLockRequest {
  LockId lock_id = 1;
  uint64 lease_id = 2;
  int64 now = 3;
}

message ReleaseLockResponse {
  Lock lock = 1;
}

message GetLockRequest {
  LockId lock_id = 1;
  int64 now = 2;
}

message GetLockResponse {
  Lock lock = 1;
}

message DeleteLockRequest {
  LockId lock_id = 1;
  int64 now = 2;
}

message DeleteLockResponse {}

message ListLocksRequest {
  NamespaceId namespace_id = 1;
  int64 now = 2;
  PaginationToken pagination_token = 3;
  int32 limit = 4;
}

message ListLocksResponse {
  repeated Lock locks = 1;
  PaginationToken next_pagination_token = 2;
  PaginationToken previous_pagination_token = 3;
}

message ListLocksByLeaseIdRequest {
  LeaseId lease_id = 1;
  int64 now = 2;
  PaginationToken pagination_token = 3;
  int32 limit = 4;
}

message ListLocksByLeaseIdResponse {
  repeated Lock locks = 1;
  PaginationToken next_pagination_token = 2;
  PaginationToken previous_pagination_token = 3;
}

message RunLocksGarbageCollectionRequest {
  int64 now = 1;
  int64 gc_records_page_size = 2;
  int64 gc_record_locks_page_size = 3;
  int64 max_visited_locks = 4;
}

message RunLocksGarbageCollectionResponse {}

message LocksDeleteNamespaceRequest {
  NamespaceId namespace_id = 1;
  uint64 record_id = 2;
  int64 now = 3;
}

message LocksDeleteNamespaceResponse {}

message CreateLockLeaseRequest {
  LeaseId lease_id = 1;
  string process_id = 2;
  uint64 ttl_seconds = 3;
  int64 now = 4;
  map<string, string> metadata = 5;
  int64 max_number_of_lock_leases = 6;
}

message CreateLockLeaseResponse {
  Lease lease = 1;
}

message RevokeLockLeaseRequest {
  LeaseId lease_id = 1;
  int64 now = 2;
}

message RevokeLockLeaseResponse {}

message RefreshLockLeaseRequest {
  LeaseId lease_id = 1;
  uint64 ttl_seconds = 2;
  int64 now = 3;
}

message RefreshLockLeaseResponse {
  Lease lease = 1;
}

message GetLockLeaseRequest {
  LeaseId lease_id = 1;
  int64 now = 2;
}

message GetLockLeaseResponse {
  Lease lease = 1;
}

message ListLockLeasesRequest {
  NamespaceId namespace_id = 1;
  int64 now = 2;
  PaginationToken pagination_token = 3;
  int32 limit = 4;
}

message ListLockLeasesResponse {
  repeated Lease leases = 1;
  PaginationToken next_pagination_token = 2;
  PaginationToken previous_pagination_token = 3;
}

message ListLockLeasesByProcessIdRequest {
  NamespaceId namespace_id = 1;
  string process_id = 2;
  int64 now = 3;
  PaginationToken pagination_token = 4;
  int32 limit = 5;
}

message ListLockLeasesByProcessIdResponse {
  repeated Lease leases = 1;
  PaginationToken next_pagination_token = 2;
  PaginationToken previous_pagination_token = 3;
}

message Lock {
  LockId id = 1;
  LockState state = 2;
  int64 locked_at = 3;
  repeated LockHolder lock_holders = 4;
}

message LockHolder {
  uint64 lease_id = 1;
  int64 locked_at = 2;
  map<string, string> metadata = 3;
}

enum LockState {
  LOCK_STATE_INVALID = 0;
  LOCK_STATE_UNLOCKED = 1;
  LOCK_STATE_SHARED_LOCKED = 2;
  LOCK_STATE_EXCLUSIVE_LOCKED = 3;
}

message LockId {
  uint64 account_id = 1;
  uint32 namespace_id = 2;
  string lock_name = 3;
}

message LocksCounter {
  int64 number_of_locks = 1;
  int64 number_of_leases = 2;
}

message LocksGarbageCollectionRecord {
  uint64 id = 1;
  NamespaceId namespace_id = 2;
}

message LockAncestor {
  LockId id = 1;
  int64 exclusive_count = 2;
  int64 shared_count = 3;
}
