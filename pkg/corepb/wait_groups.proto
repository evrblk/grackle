syntax = "proto3";

package com.evrblk.grackle.corepb;

import "pkg/corepb/common.proto";
import "pkg/corepb/namespaces.proto";

option go_package = "github.com/evrblk/grackle/pkg/corepb";

message CreateWaitGroupRequest {
  WaitGroupId wait_group_id = 1;
  string name = 2;
  string description = 3;
  // Caller-supplied current time, Unix nanoseconds. The core is a deterministic
  // replicated state machine, so the clock is passed in rather than read from the
  // host. Recurs on most requests with the same meaning.
  sfixed64 now = 4;
  // Total number of jobs that must complete for the group to finish.
  int64 counter = 5;
  // Absolute deadline, Unix nanoseconds; the group becomes EXPIRED if it has not
  // completed by then.
  sfixed64 expires_at = 6;
  map<string, string> metadata = 7;
  // Per-namespace quota enforced by the core; the create is rejected if it would
  // be exceeded.
  int64 max_number_of_wait_groups_per_namespace = 8;
  // Retention period: once finished, the group is auto-deleted this many seconds
  // after finished_at.
  int64 delete_after_finished_seconds = 9;
}

message CreateWaitGroupResponse {
  WaitGroup wait_group = 1;
}

message UpdateWaitGroupRequest {
  NamespaceId namespace_id = 1;
  string wait_group_name = 2;
  string description = 3;
  sfixed64 now = 4;
  sfixed64 expires_at = 5;
  int64 counter = 6;
  map<string, string> metadata = 7;
  // Optimistic concurrency check: must equal the wait group's current version or
  // the update is rejected.
  int64 expected_version = 8;
  int64 delete_after_finished_seconds = 9;
}

message UpdateWaitGroupResponse {
  WaitGroup wait_group = 1;
}

message ListWaitGroupsRequest {
  NamespaceId namespace_id = 1;
  PaginationToken pagination_token = 2;
  int32 limit = 3;
}

message ListWaitGroupsResponse {
  repeated WaitGroup wait_groups = 1;
  PaginationToken next_pagination_token = 2;
  PaginationToken previous_pagination_token = 3;
}

message GetWaitGroupRequest {
  WaitGroupId wait_group_id = 1;
}

message GetWaitGroupResponse {
  WaitGroup wait_group = 1;
}

message GetWaitGroupByNameRequest {
  NamespaceId namespace_id = 1;
  string wait_group_name = 2;
}

message GetWaitGroupByNameResponse {
  WaitGroup wait_group = 1;
}

message DeleteWaitGroupRequest {
  NamespaceId namespace_id = 1;
  string wait_group_name = 2;
  // Idempotency / bookkeeping id the core uses to track the asynchronous deletion
  // of this object's data. Recurs on delete and namespace-teardown requests.
  fixed64 record_id = 3;
}

message DeleteWaitGroupResponse {}

message CompleteJobsFromWaitGroupRequest {
  NamespaceId namespace_id = 1;
  string wait_group_name = 2;
  repeated CompleteJobRequest jobs = 3;
  sfixed64 now = 4;
}

message CompleteJobRequest {
  string job_id = 1;
  map<string, string> metadata = 2;
}

message CompleteJobsFromWaitGroupResponse {
  WaitGroup wait_group = 1;
}

message ListWaitGroupCompletedJobsRequest {
  NamespaceId namespace_id = 1;
  string wait_group_name = 2;
  PaginationToken pagination_token = 3;
  int32 limit = 4;
}

message ListWaitGroupCompletedJobsResponse {
  repeated WaitGroupJob jobs = 1;
  PaginationToken next_pagination_token = 2;
  PaginationToken previous_pagination_token = 3;
}

message RunWaitGroupsGarbageCollectionRequest {
  sfixed64 now = 1;
  int64 gc_records_page_size = 2;
  int64 gc_record_wait_groups_page_size = 3;
  int64 max_deleted_objects = 4;
}

message RunWaitGroupsGarbageCollectionResponse {}

message WaitGroupsDeleteNamespaceRequest {
  fixed64 record_id = 1;
  NamespaceId namespace_id = 2;
  sfixed64 now = 3;
}

message WaitGroupsDeleteNamespaceResponse {}

// WaitGroup tracks completion of a fixed set of jobs — a distributed, durable
// sync.WaitGroup for fan-in of up to millions of jobs. It starts with counter
// jobs outstanding; each job reported via CompleteJobsFromWaitGroup increments
// completed_jobs, and the group becomes COMPLETED once completed_jobs reaches
// counter (or EXPIRED if expires_at passes first).
message WaitGroup {
  WaitGroupId id = 1;
  string name = 2;
  string description = 3;
  // Creation / last-modification time, Unix nanoseconds.
  sfixed64 created_at = 4;
  sfixed64 updated_at = 5;
  // Monotonic version, bumped on every successful update. Passed back as
  // expected_version for optimistic concurrency control.
  int64 version = 6;
  // Absolute deadline, Unix nanoseconds; the group becomes EXPIRED if it has not
  // completed by then.
  sfixed64 expires_at = 7;
  // Total number of jobs required to complete the group.
  int64 counter = 8;
  // Number of distinct jobs completed so far (0 <= completed_jobs <= counter).
  int64 completed_jobs = 9;
  map<string, string> metadata = 10;
  WaitGroupStatus status = 11;
  // Retention period: the group is auto-deleted this many seconds after
  // finished_at.
  int64 delete_after_finished_seconds = 12;
  // finished_at is the timestamp (ns) at which the wait group became finished
  // (either completed or expired). Zero while the wait group is still active.
  sfixed64 finished_at = 13;
  // last_activity_at is the timestamp (ns) of the most recent activity on this
  // wait group (a job being reported completed). Not affected by reads.
  sfixed64 last_activity_at = 14;
}

// WaitGroupStatus is the lifecycle state of a wait group. A wait group starts
// ACTIVE. It becomes COMPLETED once the number of completed jobs reaches the
// counter, or EXPIRED once expires_at passes while it is still active. Both
// COMPLETED and EXPIRED are terminal "finished" states after which the wait
// group is deleted by garbage collection once delete_after_finished_seconds
// has elapsed.
enum WaitGroupStatus {
  WAIT_GROUP_STATUS_INVALID = 0;
  WAIT_GROUP_STATUS_ACTIVE = 1;
  WAIT_GROUP_STATUS_EXPIRED = 2;
  WAIT_GROUP_STATUS_COMPLETED = 3;
}

// WaitGroupJob is one completed job recorded against a wait group. Jobs are
// identified by a caller-supplied job_id, so reporting the same job twice is
// idempotent and never double-counts toward the counter.
message WaitGroupJob {
  WaitGroupJobId id = 1;
  // When the job was reported complete, Unix nanoseconds.
  sfixed64 completed_at = 2;
  map<string, string> metadata = 3;
}

// WaitGroupJobId uniquely identifies a completed job within a wait group.
// job_id is the caller-supplied (free-form) job identifier.
message WaitGroupJobId {
  fixed64 account_id = 1;
  fixed64 namespace_id = 2;
  fixed64 wait_group_id = 3;
  string job_id = 4;
}

// WaitGroupId uniquely identifies a wait group within an account and namespace.
message WaitGroupId {
  fixed64 account_id = 1;
  fixed64 namespace_id = 2;
  fixed64 wait_group_id = 3;
}

// WaitGroupsCounter holds the per-namespace aggregate counts the core maintains
// to enforce quotas.
message WaitGroupsCounter {
  int64 number_of_wait_groups = 1;
}

// WaitGroupsGarbageCollectionRecord is an internal bookkeeping entry queuing
// asynchronous deletion of either a whole namespace's wait groups or a single
// wait group's data.
message WaitGroupsGarbageCollectionRecord {
  fixed64 id = 1;
  oneof record {
    NamespaceId namespace_id = 2;
    WaitGroupId wait_group_id = 3;
  }
}

// WaitGroupsExpirationRecord is an index entry the core uses to find active wait
// groups whose deadline has passed, so they can be marked EXPIRED in time order.
message WaitGroupsExpirationRecord {
  WaitGroupId wait_group_id = 1;
  // The wait group's expires_at this entry was filed under, Unix nanoseconds.
  sfixed64 expires_at = 2;
}

// WaitGroupsDeletionRecord schedules the deletion of a finished wait group.
// delete_at is the timestamp (ns) at which garbage collection should delete
// the wait group, computed as finished_at + delete_after_finished_seconds.
message WaitGroupsDeletionRecord {
  WaitGroupId wait_group_id = 1;
  sfixed64 delete_at = 2;
}
