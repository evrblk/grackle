    ListSemaphoreLeasesRequest list_semaphore_leases_request = 6;
    ListSemaphoreLeasesByProcessIdRequest list_semaphore_leases_by_process_id_request = 7;
    GetSemaphoreLeaseRequest get_semaphore_lease_request = 8;

    GetWaitGroupRequest get_wait_group_request = 9;
    GetWaitGroupByNameRequest get_wait_group_by_name_request = 10;
    ListWaitGroupsRequest list_wait_groups_request = 11;
    ListWaitGroupJobsRequest list_wait_group_jobs_request = 12;

    GetNamespaceRequest get_namespace_request = 13;
    GetNamespaceByNameRequest get_namespace_by_name_request = 14;
    ListNamespacesRequest list_namespaces_request = 15;

    ListLocksRequest list_locks_request = 16;
    ListLocksByLeaseIdRequest list_locks_by_lease_id_request = 17;
    GetLockLeaseRequest get_lock_lease_request = 18;
    ListLockLeasesRequest list_lock_leases_request = 19;
    ListLockLeasesByProcessIdRequest list_lock_leases_by_process_id_request = 20;

