syntax = "proto3";

package com.evrblk.grackle.corepb;

import "pkg/corepb/common.proto";
import "pkg/corepb/namespaces.proto";

option go_package = "github.com/evrblk/grackle/pkg/corepb";

message CreateBarrierRequest {
  BarrierId barrier_id = 1;
  string name = 2;
  string description = 3;
  // Number of arrivals required to trip the barrier each generation.
  int64 expected_processes = 4;
  map<string, string> metadata = 5;
  // Caller-supplied current time, Unix nanoseconds. The core is a deterministic
  // replicated state machine, so the clock is passed in rather than read from the
  // host. Recurs on most requests with the same meaning.
  sfixed64 now = 6;
  // Per-namespace quota enforced by the core; the create is rejected if it would
  // be exceeded.
  int64 max_number_of_barriers_per_namespace = 7;
  // Inactivity window: the barrier is auto-deleted this many seconds after its
  // last activity (each arrival pushes the deadline out).
  int64 delete_inactive_after_seconds = 8;
}

message CreateBarrierResponse {
  Barrier barrier = 1;
}

message UpdateBarrierRequest {
  BarrierId barrier_id = 1;
  string description = 2;
  int64 expected_processes = 3;
  map<string, string> metadata = 4;
  // Optimistic concurrency check: must equal the barrier's current version or the
  // update is rejected.
  int64 expected_version = 5;
  sfixed64 now = 6;
  int64 delete_inactive_after_seconds = 7;
}

message UpdateBarrierResponse {
  Barrier barrier = 1;
  bool all_arrived = 2;
}

message ArriveAtBarrierRequest {
  NamespaceId namespace_id = 1;
  string barrier_name = 2;
  // Caller-supplied identifier of the arriving process (free-form).
  string process_id = 3;
  // The generation (cycle) the caller intends to arrive at, so a process never
  // accidentally contributes to a later cycle than the one it observed.
  int64 generation = 4;
  map<string, string> metadata = 5;
  sfixed64 now = 6;
}

message ArriveAtBarrierResponse {
  Barrier barrier = 1;
  bool all_arrived = 2;
}

message GetBarrierRequest {
  BarrierId barrier_id = 1;
}

message GetBarrierResponse {
  Barrier barrier = 1;
}

message GetBarrierByNameRequest {
  NamespaceId namespace_id = 1;
  string barrier_name = 2;
}

message GetBarrierByNameResponse {
  Barrier barrier = 1;
}

message DeleteBarrierRequest {
  NamespaceId namespace_id = 1;
  string barrier_name = 2;
  sfixed64 now = 3;
  // Idempotency / bookkeeping id the core uses to track the asynchronous deletion
  // of this object's data. Recurs on delete and namespace-teardown requests.
  fixed64 record_id = 4;
}

message DeleteBarrierResponse {}

message ListBarriersRequest {
  NamespaceId namespace_id = 1;
  sfixed64 now = 2;
  PaginationToken pagination_token = 3;
  int32 limit = 4;
}

message ListBarriersResponse {
  repeated Barrier barriers = 1;
  PaginationToken next_pagination_token = 2;
  PaginationToken previous_pagination_token = 3;
}

message ListBarrierParticipantsRequest {
  NamespaceId namespace_id = 1;
  string barrier_name = 2;
  int64 generation = 3;
  PaginationToken pagination_token = 4;
  int32 limit = 5;
}

message ListBarrierParticipantsResponse {
  repeated BarrierParticipant participants = 1;
  PaginationToken next_pagination_token = 2;
  PaginationToken previous_pagination_token = 3;
}

message RunBarriersGarbageCollectionRequest {
  sfixed64 now = 1;
  int64 gc_records_page_size = 2;
  int64 gc_record_barriers_page_size = 3;
  int64 gc_record_participants_page_size = 4;
  int64 max_visited = 5;
}

message RunBarriersGarbageCollectionResponse {}

message BarriersDeleteNamespaceRequest {
  NamespaceId namespace_id = 1;
  fixed64 record_id = 2;
  sfixed64 now = 3;
}

message BarriersDeleteNamespaceResponse {}

// Barrier is a reusable, generational rendezvous point for a fixed number of
// processes (a cyclic barrier). Processes call ArriveAtBarrier; once
// expected_processes of them have arrived, the barrier "trips": all waiters are
// released, generation advances by one, and arrived_processes resets to 0 for the
// next cycle. The generation lets a fast process wait for exactly the cycle it
// cares about and a slow one avoid contributing to the wrong cycle.
message Barrier {
  BarrierId id = 1;
  string name = 2;
  string description = 3;
  // Creation / last-modification time, Unix nanoseconds.
  sfixed64 created_at = 4;
  sfixed64 updated_at = 5;
  // Number of arrivals required to trip the barrier.
  int64 expected_processes = 6;
  // Arrivals recorded in the current generation so far (0 <= arrived_processes <
  // expected_processes; reaching it trips the barrier and resets this to 0).
  int64 arrived_processes = 7;
  // Current cycle number, starting at 1 and incremented by exactly one on each
  // trip.
  int64 generation = 8;
  // Monotonic version, bumped on every successful update. Passed back as
  // expected_version for optimistic concurrency control.
  int64 version = 9;
  map<string, string> metadata = 10;
  // last_activity_at is the timestamp (ns) of the most recent activity on this
  // barrier (creation or a process arriving). Not affected by reads.
  sfixed64 last_activity_at = 11;
  // delete_inactive_after_seconds is the inactivity window after which the
  // barrier is auto-deleted: garbage collection removes it once
  // last_activity_at + delete_inactive_after_seconds has passed. Every activity
  // pushes the deletion further out.
  int64 delete_inactive_after_seconds = 12;
}

// BarrierId uniquely identifies a barrier within an account and namespace.
message BarrierId {
  fixed64 account_id = 1;
  fixed64 namespace_id = 2;
  fixed64 barrier_id = 4;
}

// BarriersCounter holds the per-namespace aggregate counts the core maintains to
// enforce quotas.
message BarriersCounter {
  int64 number_of_barriers = 1;
}

// BarriersGarbageCollectionRecord is an internal bookkeeping entry queuing
// asynchronous deletion of either a whole namespace's barriers or a single
// barrier's data.
message BarriersGarbageCollectionRecord {
  fixed64 id = 1;
  oneof record {
    NamespaceId namespace_id = 2;
    BarrierId barrier_id = 3;
  }
}

// BarriersDeletionRecord schedules the auto-deletion of an inactive barrier.
// delete_at is the timestamp (ns) at which garbage collection should delete the
// barrier, computed as last_activity_at + delete_inactive_after_seconds.
message BarriersDeletionRecord {
  BarrierId barrier_id = 1;
  sfixed64 delete_at = 2;
}

// BarrierParticipant is one process's arrival in a given generation. Participants
// are listed per generation, so callers can see who has and has not arrived in a
// cycle.
message BarrierParticipant {
  // Caller-supplied identifier of the arrived process (free-form).
  string process_id = 1;
  // When the process arrived, Unix nanoseconds.
  sfixed64 arrived_at = 2;
  // The generation (cycle) this arrival belongs to.
  int64 generation = 3;
  map<string, string> metadata = 4;
}
