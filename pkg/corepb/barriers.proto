syntax = "proto3";

package com.evrblk.grackle.corepb;

import "pkg/corepb/common.proto";
import "pkg/corepb/namespaces.proto";

option go_package = "github.com/evrblk/grackle/pkg/corepb";

message CreateBarrierRequest {
  BarrierId barrier_id = 1;
  string name = 2;
  string description = 3;
  int64 expected_processes = 4;
  map<string, string> metadata = 5;
  sfixed64 now = 6;
  int64 max_number_of_barriers_per_namespace = 7;
  int64 delete_inactive_after_seconds = 8;
}

message CreateBarrierResponse {
  Barrier barrier = 1;
}

message UpdateBarrierRequest {
  BarrierId barrier_id = 1;
  string description = 2;
  int64 expected_processes = 3;
  map<string, string> metadata = 4;
  int64 expected_version = 5;
  sfixed64 now = 6;
  int64 delete_inactive_after_seconds = 7;
}

message UpdateBarrierResponse {
  Barrier barrier = 1;
  bool all_arrived = 2;
}

message ArriveAtBarrierRequest {
  NamespaceId namespace_id = 1;
  string barrier_name = 2;
  string process_id = 3;
  int64 generation = 4;
  map<string, string> metadata = 5;
  sfixed64 now = 6;
}

message ArriveAtBarrierResponse {
  Barrier barrier = 1;
  bool all_arrived = 2;
}

message GetBarrierRequest {
  BarrierId barrier_id = 1;
}

message GetBarrierResponse {
  Barrier barrier = 1;
}

message GetBarrierByNameRequest {
  NamespaceId namespace_id = 1;
  string barrier_name = 2;
}

message GetBarrierByNameResponse {
  Barrier barrier = 1;
}

message DeleteBarrierRequest {
  NamespaceId namespace_id = 1;
  string barrier_name = 2;
  sfixed64 now = 3;
  fixed64 record_id = 4;
}

message DeleteBarrierResponse {}

message ListBarriersRequest {
  NamespaceId namespace_id = 1;
  sfixed64 now = 2;
  PaginationToken pagination_token = 3;
  int32 limit = 4;
}

message ListBarriersResponse {
  repeated Barrier barriers = 1;
  PaginationToken next_pagination_token = 2;
  PaginationToken previous_pagination_token = 3;
}

message ListBarrierParticipantsRequest {
  NamespaceId namespace_id = 1;
  string barrier_name = 2;
  int64 generation = 3;
  PaginationToken pagination_token = 4;
  int32 limit = 5;
}

message ListBarrierParticipantsResponse {
  repeated BarrierParticipant participants = 1;
  PaginationToken next_pagination_token = 2;
  PaginationToken previous_pagination_token = 3;
}

message RunBarriersGarbageCollectionRequest {
  sfixed64 now = 1;
  int64 gc_records_page_size = 2;
  int64 gc_record_barriers_page_size = 3;
  int64 gc_record_participants_page_size = 4;
  int64 max_visited = 5;
}

message RunBarriersGarbageCollectionResponse {}

message BarriersDeleteNamespaceRequest {
  NamespaceId namespace_id = 1;
  fixed64 record_id = 2;
  sfixed64 now = 3;
}

message BarriersDeleteNamespaceResponse {}

message Barrier {
  BarrierId id = 1;
  string name = 2;
  string description = 3;
  sfixed64 created_at = 4;
  sfixed64 updated_at = 5;
  int64 expected_processes = 6;
  int64 arrived_processes = 7;
  int64 generation = 8;
  int64 version = 9;
  map<string, string> metadata = 10;
  // last_activity_at is the timestamp (ns) of the most recent activity on this
  // barrier (creation or a process arriving). Not affected by reads.
  sfixed64 last_activity_at = 11;
  // delete_inactive_after_seconds is the inactivity window after which the
  // barrier is auto-deleted: garbage collection removes it once
  // last_activity_at + delete_inactive_after_seconds has passed. Every activity
  // pushes the deletion further out.
  int64 delete_inactive_after_seconds = 12;
}

message BarrierId {
  fixed64 account_id = 1;
  fixed64 namespace_id = 2;
  fixed64 barrier_id = 4;
}

message BarriersCounter {
  int64 number_of_barriers = 1;
}

message BarriersGarbageCollectionRecord {
  fixed64 id = 1;
  oneof record {
    NamespaceId namespace_id = 2;
    BarrierId barrier_id = 3;
  }
}

// BarriersDeletionRecord schedules the auto-deletion of an inactive barrier.
// delete_at is the timestamp (ns) at which garbage collection should delete the
// barrier, computed as last_activity_at + delete_inactive_after_seconds.
message BarriersDeletionRecord {
  BarrierId barrier_id = 1;
  sfixed64 delete_at = 2;
}

message BarrierParticipant {
  string process_id = 1;
  sfixed64 arrived_at = 2;
  int64 generation = 3;
  map<string, string> metadata = 4;
}
