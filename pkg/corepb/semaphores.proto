syntax = "proto3";

package com.evrblk.grackle.corepb;

import "pkg/corepb/common.proto";
import "pkg/corepb/namespaces.proto";

option go_package = "github.com/evrblk/grackle/pkg/corepb";

message CreateSemaphoreRequest {
  SemaphoreId semaphore_id = 1;
  string name = 2;
  string description = 3;
  sfixed64 now = 4;
  int64 permits = 5;
  map<string, string> metadata = 6;
  int64 max_number_of_semaphores_per_namespace = 7;
}

message CreateSemaphoreResponse {
  Semaphore semaphore = 1;
}

message ListSemaphoresRequest {
  NamespaceId namespace_id = 1;
  PaginationToken pagination_token = 2;
  int32 limit = 3;
  sfixed64 now = 4;
}

message ListSemaphoresResponse {
  repeated Semaphore semaphores = 1;
  PaginationToken next_pagination_token = 2;
  PaginationToken previous_pagination_token = 3;
}

message ListSemaphoresByLeaseIdRequest {
  LeaseId lease_id = 1;
  PaginationToken pagination_token = 2;
  int32 limit = 3;
  sfixed64 now = 4;
}

message ListSemaphoresByLeaseIdResponse {
  repeated Semaphore semaphores = 1;
  PaginationToken next_pagination_token = 2;
  PaginationToken previous_pagination_token = 3;
}

message GetSemaphoreRequest {
  SemaphoreId semaphore_id = 1;
  sfixed64 now = 2;
}

message GetSemaphoreResponse {
  Semaphore semaphore = 1;
}

message GetSemaphoreByNameRequest {
  NamespaceId namespace_id = 1;
  string semaphore_name = 2;
  sfixed64 now = 3;
}

message GetSemaphoreByNameResponse {
  Semaphore semaphore = 1;
}

message AcquireSemaphoreRequest {
  NamespaceId namespace_id = 1;
  string semaphore_name = 2;
  fixed64 lease_id = 3;
  int64 weight = 4;
  sfixed64 now = 5;
  map<string, string> metadata = 6;
}

message AcquireSemaphoreResponse {
  Semaphore semaphore = 1;
  bool success = 2;
}

message ReleaseSemaphoreRequest {
  NamespaceId namespace_id = 1;
  string semaphore_name = 2;
  fixed64 lease_id = 3;
  sfixed64 now = 4;
}

message ReleaseSemaphoreResponse {
  Semaphore semaphore = 1;
}

message UpdateSemaphoreRequest {
  NamespaceId namespace_id = 1;
  string semaphore_name = 2;
  string description = 3;
  int64 permits = 4;
  sfixed64 now = 5;
  map<string, string> metadata = 6;
  int64 expected_version = 7;
}

message UpdateSemaphoreResponse {
  Semaphore semaphore = 1;
}

message DeleteSemaphoreRequest {
  NamespaceId namespace_id = 1;
  string semaphore_name = 2;
  fixed64 record_id = 3;
}

message DeleteSemaphoreResponse {}

message ListSemaphoreHoldersRequest {
  NamespaceId namespace_id = 1;
  string semaphore_name = 2;
  PaginationToken pagination_token = 3;
  int32 limit = 4;
  sfixed64 now = 5;
}

message ListSemaphoreHoldersResponse {
  repeated SemaphoreHolder holders = 1;
  PaginationToken next_pagination_token = 2;
  PaginationToken previous_pagination_token = 3;
}

message ListSemaphoreLeasesRequest {
  NamespaceId namespace_id = 1;
  PaginationToken pagination_token = 2;
  int32 limit = 3;
  sfixed64 now = 4;
}

message ListSemaphoreLeasesResponse {
  repeated Lease leases = 1;
  PaginationToken next_pagination_token = 2;
  PaginationToken previous_pagination_token = 3;
}

message ListSemaphoreLeasesByProcessIdRequest {
  NamespaceId namespace_id = 1;
  string process_id = 2;
  PaginationToken pagination_token = 3;
  int32 limit = 4;
  sfixed64 now = 5;
}

message ListSemaphoreLeasesByProcessIdResponse {
  repeated Lease leases = 1;
  PaginationToken next_pagination_token = 2;
  PaginationToken previous_pagination_token = 3;
}

message GetSemaphoreLeaseRequest {
  LeaseId lease_id = 1;
  sfixed64 now = 2;
}

message GetSemaphoreLeaseResponse {
  Lease lease = 1;
}

message CreateSemaphoreLeaseRequest {
  LeaseId lease_id = 1;
  string process_id = 2;
  int64 ttl_seconds = 3;
  sfixed64 now = 4;
  map<string, string> metadata = 5;
  int64 max_number_of_semaphore_leases = 6;
}

message CreateSemaphoreLeaseResponse {
  Lease lease = 1;
}

message RevokeSemaphoreLeaseRequest {
  LeaseId lease_id = 1;
  sfixed64 now = 2;
}

message RevokeSemaphoreLeaseResponse {}

message RefreshSemaphoreLeaseRequest {
  LeaseId lease_id = 1;
  int64 ttl_seconds = 2;
  sfixed64 now = 3;
}

message RefreshSemaphoreLeaseResponse {
  Lease lease = 1;
}

message SemaphoresDeleteNamespaceRequest {
  fixed64 record_id = 1;
  NamespaceId namespace_id = 2;
  sfixed64 now = 3;
}

message SemaphoresDeleteNamespaceResponse {}

message RunSemaphoresGarbageCollectionRequest {
  sfixed64 now = 1;
  int64 gc_records_page_size = 2;
  int64 gc_record_semaphores_page_size = 3;
  // Maximum number of records (holders + semaphores + leases) deleted by one GC pass.
  // Bounds the transaction size; the GC worker calls this method repeatedly until everything drains.
  int64 max_visited = 4;
  int64 gc_record_holders_page_size = 5;
}

message RunSemaphoresGarbageCollectionResponse {}

message Semaphore {
  SemaphoreId id = 1;
  string name = 2;
  string description = 3;
  sfixed64 created_at = 4;
  sfixed64 updated_at = 5;
  int64 version = 6;
  int64 permits = 7;
  map<string, string> metadata = 8;
  int64 active_holds = 9;
  int64 active_holders_count = 10;
  sfixed64 earliest_holder_expires_at = 11;
  // last_activity_at is the timestamp (ns) of the most recent activity on this
  // semaphore (an acquire attempt or a release). Not affected by reads.
  sfixed64 last_activity_at = 12;
}

message SemaphoreHolder {
  SemaphoreHolderId id = 1;
  sfixed64 locked_at = 2;
  sfixed64 expires_at = 3;
  int64 weight = 4;
  map<string, string> metadata = 5;
}

message SemaphoreHolderId {
  fixed64 account_id = 1;
  fixed64 namespace_id = 2;
  fixed64 semaphore_id = 3;
  fixed64 lease_id = 4;
}

message SemaphoreId {
  fixed64 account_id = 1;
  fixed64 namespace_id = 2;
  fixed64 semaphore_id = 3;
}

message SemaphoresGarbageCollectionRecord {
  fixed64 id = 1;
  oneof record {
    NamespaceId namespace_id = 2;
    SemaphoreId semaphore_id = 3;
  }
}

message SemaphoresCounter {
  int64 number_of_semaphores = 1;
  int64 number_of_leases = 2;
}

message SemaphoresExpirationRecord {
  SemaphoreId semaphore_id = 1;
  sfixed64 expires_at = 2;
}
